services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ceres
      POSTGRES_PASSWORD: ceres
      POSTGRES_DB: ceres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ceres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 3

  api:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    command: uvicorn ceres.api:app --host 0.0.0.0 --port 8000
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ceres:ceres@postgres:5432/ceres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/status"]
      interval: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2g
    shm_size: "256m"

  worker:
    build: .
    env_file: .env
    command: arq ceres.queue.WorkerSettings
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ceres:ceres@postgres:5432/ceres
    deploy:
      resources:
        limits:
          memory: 2g
    shm_size: "256m"

  dashboard:
    build:
      context: ./dashboard
      args:
        VITE_API_URL: http://localhost:8000
    ports: ["3000:3000"]
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
