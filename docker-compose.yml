services:
  api:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    command: uvicorn ceres.api:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/status"]
      interval: 10s
      retries: 3

  dashboard:
    build:
      context: ./dashboard
      args:
        VITE_API_URL: http://localhost:8000
    ports: ["3000:3000"]
    depends_on:
      api:
        condition: service_healthy
