services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 3

  api:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    command: uvicorn ceres.api:app --host 0.0.0.0 --port 8000
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/status"]
      interval: 10s
      retries: 3

  worker:
    build: .
    env_file: .env
    command: python -m ceres.worker
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  dashboard:
    build:
      context: ./dashboard
      args:
        VITE_API_URL: http://localhost:8000
    ports: ["3000:3000"]
    depends_on:
      api:
        condition: service_healthy
