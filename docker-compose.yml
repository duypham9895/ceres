services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 3

  api:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    command: uvicorn ceres.api:app --host 0.0.0.0 --port 8000
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/status"]
      interval: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2g
    shm_size: "256m"

  worker:
    build: .
    env_file: .env
    command: arq ceres.queue.WorkerSettings
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2g
    shm_size: "256m"

  dashboard:
    build:
      context: ./dashboard
      args:
        VITE_API_URL: http://localhost:8000
    ports: ["3000:3000"]
    depends_on:
      api:
        condition: service_healthy
